<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Aluno - Muay Thai</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4 flex items-center justify-center">
    <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl w-full max-w-md shadow-2xl">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-red-500">Novo Aluno</h2>
            <a href="{% url 'dashboard' %}" class="text-zinc-500 hover:text-zinc-300 text-sm">Cancelar</a>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Nome -->
            <div>
                <label for="id_nome" class="block text-xs font-semibold text-zinc-400 uppercase mb-2">Nome Completo</label>
                <input type="text" name="nome" id="id_nome" required
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-red-500 text-sm"
                       placeholder="Nome do aluno">
            </div>

            <!-- Telefone -->
            <div>
                <label for="id_telefone" class="block text-xs font-semibold text-zinc-400 uppercase mb-2">Telefone / WhatsApp</label>
                <input type="text" name="telefone" id="id_telefone" required
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-red-500 text-sm"
                       placeholder="(00) 00000-0000">
            </div>

            <!-- Campo Turma (Coloque isso abaixo do bloco do Telefone) -->
            <div>
                <label for="id_turma" class="block text-xs font-semibold text-zinc-400 uppercase mb-2">Turma / Horário</label>
                <select name="turma" id="id_turma" required
                        class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">
                    {% for valor, nome_turma in form.fields.turma.choices %}
                        <option value="{{ valor }}">{{ nome_turma }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Dia do Vencimento -->
                <div>
                    <label for="id_dia_vencimento" class="block text-xs font-semibold text-zinc-400 uppercase mb-2">Dia Vencimento</label>
                    <input type="number" name="dia_vencimento" id="id_dia_vencimento" min="1" max="31" required
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-red-500 text-sm"
                           placeholder="Ex: 10">
                </div>

                <!-- Valor da Mensalidade -->
                <div>
                    <label for="id_valor_mensalidade" class="block text-xs font-semibold text-zinc-400 uppercase mb-2">Mensalidade (R$)</label>
                    <input type="number" name="valor_mensalidade" id="id_valor_mensalidade" step="0.01" required
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-red-500 text-sm"
                           placeholder="120">
                </div>
            </div>

            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition duration-150 shadow-lg shadow-red-900/30 mt-6">
                Salvar Aluno
            </button>
        </form>
    </div>
</body>
</html>
