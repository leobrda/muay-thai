<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle Muay Thai</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white flex items-center justify-center min-h-screen p-4">
    <div class="bg-zinc-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-zinc-800">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-extrabold text-red-500">🥋 Muay Thai</h2>
            <p class="text-zinc-400 mt-2 text-sm">Faça login para gerenciar as mensalidades</p>
        </div>

        <!-- Exibe erros de login caso o usuário erre a senha -->
        {% if form.errors %}
            <div class="bg-red-950/50 border border-red-500 text-red-200 p-3 rounded-lg text-sm mb-4 text-center">
                Usuário ou senha incorretos. Tente novamente.
            </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Campo de Usuário -->
            <div>
                <label for="id_username" class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Usuário</label>
                <input type="text" name="username" id="id_username" autocomplete="username" required
                       class="w-full bg-zinc-850 bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent placeholder-zinc-500 text-sm"
                       placeholder="Digite seu usuário">
            </div>

            <!-- Campo de Senha -->
            <div>
                <label for="id_password" class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Senha</label>
                <input type="password" name="password" id="id_password" autocomplete="current-password" required
                       class="w-full bg-zinc-850 bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent placeholder-zinc-500 text-sm"
                       placeholder="Digite sua senha">
            </div>

            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 active:scale-[0.98] text-white font-bold py-3 rounded-lg transition duration-150 shadow-lg shadow-red-900/30">
                Entrar no Sistema
            </button>
        </form>

        <p class="text-zinc-500 text-center mt-6 text-sm">
            Não tem uma conta? <a href="{% url 'cadastro_professor' %}" class="text-red-400 hover:text-red-300 font-semibold hover:underline">Cadastre-se</a>
        </p>
    </div>
</body>
</html>
